# Publishes the OpenHands PyPi package
name: Publish PyPi Package

# Triggered manually
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: true
        default: ''

jobs:
  release:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
      - uses: useblacksmith/setup-python@v6
        with:
          python-version: 3.12
      - name: Install dependencies (prefer uv sync, fallback to Poetry)
        run: |
          if [ -f uv.lock ]; then
            echo "Using uv.lock (uv sync)"
            uv sync --group runtime --dev || true
          fi
          if ! python -c "import sys; import pathlib; sys.exit(0 if pathlib.Path('.venv').exists() else 1)"; then
            echo "uv sync did not create .venv (or uv.lock missing); using Poetry fallback"
            uvx poetry install --no-interaction --no-root --with runtime
          fi
      - name: Build project
        run: |
          # Prefer uv build; fallback to Poetry build script
          if command -v uv >/dev/null 2>&1; then
            uv build || true
          fi
          if [ ! -d dist ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "uv build did not produce artifacts; running ./build.sh as fallback"
            ./build.sh
          fi
      - name: Publish to PyPI (prefer twine)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install twine
          if [ -d dist ] && [ -n "$(ls -A dist 2>/dev/null)" ]; then
            twine upload --non-interactive dist/*
          else
            echo "No distribution artifacts found in dist/" >&2
            exit 1
          fi
