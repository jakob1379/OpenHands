# Publishes the OpenHands PyPi package
name: Publish PyPi Package

# Triggered manually
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: true
        default: ''

jobs:
  release:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
      - uses: useblacksmith/setup-python@v6
        with:
          python-version: 3.12
      - name: Install dependencies (uv)
        run: |
          if [ -f uv.lock ]; then
            echo "Using uv.lock (uv sync)"
            uv sync --group runtime --dev
          else
            echo "uv.lock not found; running uv sync (no lock)"
            uv sync --group runtime --dev
          fi
      - name: Build project (uv)
        run: |
          uv build
      - name: Publish to PyPI (uv publish)
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv publish
